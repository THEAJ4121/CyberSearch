<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>CyberSearch — Cybersecurity Tools & Resources</title>
    <meta
      name="description"
      content="Search and discover cybersecurity tools, frameworks, operating systems, learning platforms, GitHub repositories, and vulnerability databases."
    />
    <meta
      name="keywords"
      content="cybersecurity, penetration testing, OSINT, hacking tools, CTF, security frameworks"
    />
    <meta name="author" content="CyberSearch" />

    <!-- Google Fonts: Orbitron (headings), Rajdhani (body), JetBrains Mono (code) -->
    <!-- Why preconnect? It establishes the connection to Google's servers early,
         speeding up font loading. Without it, the browser waits until it sees the
         <link> tag, wasting valuable milliseconds. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
