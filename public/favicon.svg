<svg 
    xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
    <defs>
        <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00FFA3" />
            <stop offset="100%" stop-color="#03E1FF" />
        </linearGradient>
        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0B0F19" />
            <stop offset="100%" stop-color="#1A2235" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Outer Shield -->
    <path d="M24 4L6 10v12c0 11.55 7.84 21.6 18 24 10.16-2.4 18-12.45 18-24V10L24 4z" fill="url(#shieldGrad)" stroke="url(#cyberGrad)" stroke-width="2.5" filter="url(#glow)" />
    <!-- Inner Magnifying Glass -->
    <circle cx="21" cy="20" r="7" fill="none" stroke="url(#cyberGrad)" stroke-width="3" />
    <line x1="26" y1="25" x2="33" y2="33" stroke="url(#cyberGrad)" stroke-width="3.5" stroke-linecap="round" />
    <!-- Lens reflection highlight -->
    <path d="M19 15.5A4.5 4.5 0 0 1 24.5 21" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>